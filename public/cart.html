<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="max-width:600px;margin:40px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);font-family:sans-serif;"></div>
        <h2 style="text-align:center;color:#333;margin-bottom:24px;">Shopping Cart</h2>
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr style="background:#f5f5f5;">
                    <th style="padding:12px 8px;text-align:left;">Product</th>
                    <th style="padding:12px 8px;text-align:right;">Price</th>
                    <th style="padding:12px 8px;text-align:center;">Quantity</th>
                    <th style="padding:12px 8px;text-align:right;">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding:10px 8px;">Wireless Mouse</td>
                    <td style="padding:10px 8px;text-align:right;">$15.99</td>
                    <td style="padding:10px 8px;text-align:center;">2</td>
                    <td style="padding:10px 8px;text-align:right;">$31.98</td>
                </tr>
                <tr>
                    <td style="padding:10px 8px;">USB-C Cable</td>
                    <td style="padding:10px 8px;text-align:right;">$7.99</td>
                    <td style="padding:10px 8px;text-align:center;">1</td>
                    <td style="padding:10px 8px;text-align:right;">$7.99</td>
                </tr>
            </tbody>
            <tfoot>
                <tr style="background:#f5f5f5;">
                    <td colspan="3" style="padding:12px 8px;text-align:right;font-weight:bold;">Subtotal</td>
                    <td style="padding:12px 8px;text-align:right;font-weight:bold;">$39.97</td>
                </tr>
            </tfoot>
        </table>
        <div style="text-align:right;margin-top:24px;">
            <button style="background:#007bff;color:#fff;border:none;padding:12px 24px;border-radius:4px;font-size:16px;cursor:pointer;">Checkout</button>
        </div>
    </div>
</body>
</html>
